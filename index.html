<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Construcción | gozmac.com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* Fondo oscuro profundo */
            color: #cbd5e1; /* Texto claro suave */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            background: #1e293b; /* Tarjeta un poco más clara que el fondo */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155; /* Borde sutil */
        }

        .illustration {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 30px;
            opacity: 0.85; /* Reduce el brillo de la imagen para modo oscuro */
        }

        h1 {
            font-size: 2.5rem;
            color: #f8fafc; /* Texto principal casi blanco */
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8; /* Texto secundario grisáceo */
            line-height: 1.6;
            margin-bottom: 30px;
        }

        p strong {
            color: #38bdf8; /* Resalta el dominio en azul neón */
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #334155;
            border-top: 5px solid #38bdf8; /* Spinner a juego con el azul */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <img class="illustration" src="https://images.unsplash.com/featured/600x400/?tech,construction" alt="Sitio en construcción">
        
        <div class="spinner"></div>
        
        <h1>Estamos trabajando en algo grande</h1>
        <p>El sitio web <strong>gozmac.com</strong> está recibiendo mejoras internas. Volveremos muy pronto con una experiencia totalmente renovada. ¡Gracias por tu paciencia!</p>
        
        <div class="footer">
            &copy; 2026 gozmac.com - Todos los derechos reservados.
        </div>
    </div>

</body>
</html>
